<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>排班系統</title>
</head>

<body>

<h2>工讀排班</h2>

姓名：
<input id="name"><br><br>

<div id="jobs"></div>

<script>
const API = "👉貼你的 Apps Script 網址";

async function loadJobs(){
  const res = await fetch(API);
  const data = await res.json();

  let html = "";

  data.forEach(j => {
    const full = j.remain <= 0;

    html += `
      <div>
        ${j.job}（${j.start}-${j.end}）<br>
        薪資：${j.salary} 元<br>
        剩餘：${j.remain}<br>

        <button ${full ? "disabled" : ""}
          onclick="apply('${j.id}')">
          ${full ? "額滿" : "報名"}
        </button>
      </div><br>
    `;
  });

  document.getElementById("jobs").innerHTML = html;
}

async function apply(id){
  const name = document.getElementById("name").value;

  if(!name){
    alert("請填姓名");
    return;
  }

  const form = new FormData();
  form.append("name", name);
  form.append("id", id);

  const res = await fetch(API, {
    method: "POST",
    body: form
  });

  const text = await res.text();

  if(text === "success"){
    alert("成功");
  } else if(text === "full"){
    alert("額滿");
  }

  loadJobs();
}

loadJobs();
</script>

</body>
</html>
